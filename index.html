<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>K1 계양점 학생 관리시스템</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#f0f2f5;display:flex;height:100vh;overflow:hidden}
/* ── 사이드바 ── */
#sidenav{width:196px;min-width:196px;background:#0f172a;display:flex;flex-direction:column;height:100vh}
.nav-logo{padding:18px 16px 14px;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:10px}
.logo-box{width:34px;height:34px;background:#3b82f6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0}
.logo-title{color:#fff;font-size:13px;font-weight:800;line-height:1.4}
.logo-sub{color:#64748b;font-size:10.5px}
.nav-menu{list-style:none;padding:10px 0;flex:1}
.nav-item{padding:11px 16px;color:#94a3b8;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s;border-left:3px solid transparent;user-select:none}
.nav-item:hover{background:#1e293b;color:#e2e8f0}
.nav-item.active{background:#1e293b;color:#60a5fa;border-left-color:#3b82f6;font-weight:700}
.nav-icon{font-size:15px;width:18px;text-align:center}
.nav-bottom{padding:12px 16px;border-top:1px solid #1e293b;color:#475569;font-size:11px}
/* ── 앱 영역 ── */
#app{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#page-header{background:#fff;padding:12px 24px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#page-header h2{font-size:15px;font-weight:800;color:#0f172a}
#page-header .sub{font-size:11px;color:#94a3b8;margin-top:2px}
#page-content{flex:1;overflow-y:auto;padding:20px 24px}
#page-content::-webkit-scrollbar{width:6px}
#page-content::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.page{display:none}
.page.active{display:block}
/* ── 대시보드 ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid #e5e7eb}
.stat-card .s-lbl{font-size:11.5px;color:#64748b;margin-bottom:6px}
.stat-card .s-val{font-size:30px;font-weight:900;line-height:1}
.stat-card .s-sub{font-size:11px;color:#94a3b8;margin-top:5px}
.sec-title{font-size:13px;font-weight:700;color:#374151;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title span{font-size:11px;color:#9ca3af;font-weight:400}
.board-wrap{display:flex;flex-direction:column;gap:12px;overflow-x:hidden}
.board-col{min-width:205px;max-width:205px;background:#f1f5f9;border-radius:12px;padding:10px;flex-shrink:0;transition:background .15s}
.board-col.bover{background:#dbeafe}
.board-col-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid #e2e8f0}
.board-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;flex-shrink:0}
.board-col-name{font-weight:700;font-size:13px;flex:1;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.board-col-cnt{font-size:10px;color:#64748b;background:#e2e8f0;padding:1px 6px;border-radius:9px;font-weight:600;flex-shrink:0}
.board-col-del{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0}
.board-col-del:hover{color:#ef4444}
.board-col-body{min-height:30px}
.bcard{background:#fff;border-radius:7px;padding:6px 9px;margin-bottom:5px;cursor:grab;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;align-items:center;justify-content:space-between;border-left:3px solid #e2e8f0;transition:box-shadow .12s;user-select:none}
.bcard:hover{box-shadow:0 3px 10px rgba(0,0,0,.13)}
.bcard.dragging{opacity:.35;cursor:grabbing}
.bcard.b-leave{opacity:.5;cursor:default}
.bcard-name{font-size:12px;font-weight:600;color:#1e293b}
.bcard-name.clickable{cursor:pointer}
.bcard-name.clickable:hover{color:#3b82f6}
.bcard-badge{font-size:10px;padding:1px 5px;border-radius:6px;font-weight:700;flex-shrink:0;margin-left:4px}
.board-add-stu{width:100%;padding:5px;border:1.5px dashed #cbd5e1;background:none;cursor:pointer;color:#94a3b8;font-size:11px;border-radius:7px;margin-top:4px;transition:all .12s;box-sizing:border-box}
.board-add-stu:hover{background:#e2e8f0;color:#475569;border-color:#94a3b8}
.badd-form{margin-top:4px}
.badd-input{width:100%;padding:5px 8px;border:1.5px solid #3b82f6;border-radius:7px;font-size:12px;outline:none;box-sizing:border-box}
.board-col-add-wrap{display:flex;align-items:flex-start;padding-top:2px;flex-shrink:0}
.board-add-col-btn{width:44px;height:44px;background:#e2e8f0;border:none;border-radius:10px;cursor:pointer;color:#64748b;font-size:24px;font-weight:300;line-height:1;transition:all .12s}
.board-add-col-btn:hover{background:#cbd5e1;color:#1e293b}
.team-row{background:#fff;border-radius:14px;border:1.5px solid #e2e8f0;overflow:hidden}
.team-hdr{display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;user-select:none}
.team-hdr:hover{background:#f8fafc}
.team-av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:900;flex-shrink:0}
.team-name{font-size:15px;font-weight:900;flex:1;color:#1e293b}
.team-cnt{font-size:11px;color:#64748b;background:#f1f5f9;padding:2px 8px;border-radius:9px;flex-shrink:0}
.team-toggle{font-size:11px;color:#94a3b8;transition:transform .2s;flex-shrink:0;font-weight:700}
.team-toggle.closed{transform:rotate(-90deg)}
.team-body{display:flex;gap:12px;overflow-x:auto;overflow-y:hidden;overscroll-behavior-x:contain;padding:4px 14px 14px;align-items:flex-start}
.team-body.hidden,.board-col-body.hidden,.board-add-stu.hidden{display:none}
.board-col-hdr{cursor:pointer;border-radius:8px;transition:background .1s}
.board-col-hdr:hover{background:rgba(0,0,0,.04)}
.board-col-name.bcc::after{content:" ▸";font-size:9px;color:#94a3b8;margin-left:2px}
.bcm-popup{background:#fff;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.15);padding:4px;min-width:120px;border:1px solid #e2e8f0}
.bcm-item{padding:6px 12px;font-size:12px;cursor:pointer;border-radius:6px;white-space:nowrap;color:#1e293b}
.bcm-item:hover{background:#f1f5f9}
.bcm-item.bcm-green{color:#16a34a}
.bcm-item.bcm-red{color:#dc2626}
.bcm-item.bcm-gray{color:#64748b}
.bcm-sep{height:1px;background:#f1f5f9;margin:3px 0}
.bcard-menu-btn{background:none;border:none;cursor:pointer;color:#cbd5e1;padding:0 2px;font-size:15px;line-height:1;flex-shrink:0}
.bcard-menu-btn:hover{color:#475569}
.ts-stu{background:#f8fafc;border-radius:8px;padding:8px 10px;font-size:12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.ts-stu:hover{background:#eff6ff}
.ts-stu .ts-n{font-weight:600;color:#1e293b}
.ts-stu .ts-sc{font-size:10.5px;padding:1px 5px;border-radius:6px}
/* ── 학생별 성취도 ── */
#students-layout{display:flex;gap:14px;height:calc(100vh - 112px)}
#stu-list-panel{width:210px;flex-shrink:0;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
#stu-search{width:100%;padding:10px 12px;border:none;border-bottom:1px solid #f1f5f9;font-size:12px;outline:none;color:#0f172a}
#stu-search::placeholder{color:#9ca3af}
.sf-row{display:flex;gap:3px;padding:7px 8px;border-bottom:1px solid #f1f5f9}
.sf-btn{flex:1;padding:4px 0;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer}
.sf-btn.on{background:#3b82f6;color:#fff}
.sf-btn:not(.on){background:#f1f5f9;color:#64748b}
#stu-items{flex:1;overflow-y:auto}
#stu-items::-webkit-scrollbar{width:3px}
#stu-items::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}
.sl-row{padding:8px 11px;font-size:12px;color:#374151;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f9fafb;gap:4px}
.sl-row:hover{background:#f8fafc}
.sl-row.active{background:#eff6ff;color:#1d4ed8;font-weight:700}
.sl-left{display:flex;align-items:center;gap:4px;min-width:0;flex:1}
.sl-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sl-tag{font-size:9.5px;padding:1px 4px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.sl-cnt{font-size:10px;color:#94a3b8;flex-shrink:0}
#stu-detail-panel{flex:1;overflow-y:auto;min-width:0}
#stu-detail-panel::-webkit-scrollbar{width:5px}
#stu-detail-panel::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
#stu-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;text-align:center}
#stu-welcome h3{font-size:15px;color:#64748b;margin-bottom:6px;margin-top:14px}
.stu-hdr{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stu-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:#fff;flex-shrink:0}
.stu-info h2{font-size:18px;font-weight:800;color:#0f172a;margin-bottom:3px}
.stu-info .meta{font-size:12px;color:#64748b}
.stu-right{margin-left:auto;text-align:right}
.score-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;font-size:13px;font-weight:800;margin-bottom:6px}
.m-tags{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end}
.m-tag{display:inline-block;border-radius:8px;padding:2px 7px;font-size:10px}
.m-con{background:#dbeafe;color:#1d4ed8}.m-buz{background:#fce7f3;color:#be185d}
.charts-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.chart-card{background:#fff;border-radius:12px;padding:13px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.ct{font-size:10.5px;font-weight:700;color:#475569;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.cbadge{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:700}
.up{background:#dcfce7;color:#16a34a}.dn{background:#fee2e2;color:#dc2626}.fl{background:#fef9c3;color:#ca8a04}
.chart-wrap{height:115px;position:relative}
.card-box{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-box h3{font-size:12px;font-weight:700;color:#475569;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#f8fafc;color:#64748b;font-weight:600;padding:7px 8px;text-align:center;border-bottom:2px solid #e2e8f0;white-space:nowrap}
td{padding:6px 8px;text-align:center;border-bottom:1px solid #f1f5f9;color:#1e293b}
td.mc{font-weight:700;color:#3b82f6;text-align:left;white-space:nowrap}
td.nv{color:#d1d5db}
td.cc{background:#eff6ff}td.bc{background:#fdf2f8}
.pi{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.pi:last-child{border-bottom:none}
.pi-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.pi-body h4{font-size:11.5px;font-weight:700;color:#1e293b;margin-bottom:3px}
.pi-msg{font-size:11px;color:#374151;line-height:1.6;margin-bottom:3px}
.pi-drill{font-size:10px;color:#6b7280;background:#f9fafb;border-left:3px solid #e5e7eb;padding:3px 8px;border-radius:0 4px 4px 0;margin-top:3px;line-height:1.5}
.pg .pi-drill{border-left-color:#16a34a;background:#f0fdf4}
.pw .pi-drill{border-left-color:#ca8a04;background:#fffbeb}
.pd .pi-drill{border-left-color:#dc2626;background:#fff1f2}
/* ── 정체학생 관리 ── */
.stag-filters{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.sf2{padding:6px 14px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;color:#374151;transition:all .15s}
.sf2.on{background:#0f172a;color:#fff;border-color:#0f172a}
.stag-tbl-wrap{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
.stag-tbl{width:100%;border-collapse:collapse;font-size:12px}
.stag-tbl th{background:#f8fafc;color:#64748b;font-weight:700;padding:10px 12px;text-align:left;border-bottom:2px solid #e5e7eb;white-space:nowrap}
.stag-tbl td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.stag-tbl tr:hover td{background:#f8fafc}
.cause-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;margin:1px;background:#fee2e2;color:#dc2626}
.cause-tag.warn{background:#fef9c3;color:#ca8a04}
.st-btn{padding:4px 10px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.st-pending{background:#f1f5f9;color:#64748b}
.st-active{background:#fef9c3;color:#ca8a04}
.st-done{background:#dcfce7;color:#16a34a}
.go-btn{padding:3px 9px;border:none;border-radius:6px;font-size:11px;background:#eff6ff;color:#2563eb;cursor:pointer;font-weight:600}
.re-edited{font-size:10px;color:#94a3b8;margin-top:3px;padding:2px 0;border-top:1px dashed #e2e8f0}
.stag-group{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:10px;overflow:hidden}
.stag-ghdr{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;border-bottom:1px solid #f1f5f9;user-select:none}
.stag-ghdr:hover{background:#f8fafc}
.stag-gcnt{font-size:12px;color:#64748b;margin-left:4px}
.stag-toggle{margin-left:auto;font-size:11px;color:#94a3b8;transition:transform .2s}
.stag-toggle.closed{transform:rotate(-90deg)}
.stag-gbody{padding:0}
.stag-gbody.hidden{display:none}
.stag-empty{padding:12px 16px;font-size:12px;color:#94a3b8;font-style:italic}
/* ── 상담/조치 기록 ── */
#records-layout{display:flex;gap:14px;height:calc(100vh - 112px)}
#rec-left{width:240px;flex-shrink:0;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
#rec-left h3{padding:12px 14px;border-bottom:1px solid #f1f5f9;font-size:12.5px;font-weight:700;color:#374151}
#rec-stu-search{width:100%;padding:9px 12px;border:none;border-bottom:1px solid #f1f5f9;font-size:12px;outline:none}
#rec-stu-list{flex:1;overflow-y:auto}
.rec-stu-row{padding:9px 12px;font-size:12px;color:#374151;cursor:pointer;border-bottom:1px solid #f9fafb;display:flex;align-items:center;justify-content:space-between}
.rec-stu-row:hover{background:#f8fafc}
.rec-stu-row.active{background:#eff6ff;color:#1d4ed8;font-weight:700}
.rec-badge{font-size:10px;background:#e0f2fe;color:#0369a1;padding:1px 6px;border-radius:8px}
#rec-right{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0}
.rec-form-box{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.rec-form-box h3{font-size:12.5px;font-weight:700;color:#374151;margin-bottom:12px}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-row label{font-size:11.5px;color:#64748b;display:flex;flex-direction:column;gap:3px;flex:1}
.form-row input,.form-row select,.form-row textarea{padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;outline:none;font-family:inherit;width:100%}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#3b82f6}
textarea{resize:vertical;min-height:70px}
.save-btn{padding:8px 20px;background:#0f172a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
.save-btn:hover{background:#1e293b}
.rec-history{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08);flex:1;overflow-y:auto}
.rec-history h3{font-size:12.5px;font-weight:700;color:#374151;margin-bottom:12px}
.rec-entry{border-left:3px solid #e5e7eb;padding:8px 12px;margin-bottom:8px;background:#f8fafc;border-radius:0 8px 8px 0}
.rec-entry.type-상담{border-left-color:#3b82f6}
.rec-entry.type-피드백{border-left-color:#10b981}
.rec-entry.type-프로그램{border-left-color:#f59e0b}
.rec-entry.type-기타{border-left-color:#8b5cf6}
.re-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.re-type{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:700}
.re-date{font-size:10.5px;color:#94a3b8}
.re-teacher{font-size:10.5px;color:#64748b}
.re-note{font-size:12px;color:#374151;line-height:1.6}
.rec-empty{text-align:center;color:#94a3b8;font-size:12px;padding:30px 0}

.team-col-add{display:flex;align-items:flex-start;padding-top:2px;flex-shrink:0}
.team-add-col-btn{width:38px;height:38px;background:rgba(255,255,255,.6);border:1.5px dashed #cbd5e1;border-radius:10px;cursor:pointer;color:#94a3b8;font-size:20px;font-weight:300;line-height:1;transition:all .12s;flex-shrink:0}
.team-add-col-btn:hover{background:#fff;border-color:#94a3b8;color:#475569}
.nm-overlay{position:fixed;inset:0;z-index:10000;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center}
.nm-box{background:#fff;border-radius:16px;padding:22px 24px;width:340px;max-width:92vw;box-shadow:0 24px 80px rgba(0,0,0,.25)}
.nm-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.nm-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:800;flex-shrink:0}
.nm-ta{width:100%;padding:10px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;resize:none;outline:none;box-sizing:border-box;font-family:inherit;transition:border-color .15s}
.nm-ta:focus{border-color:#3b82f6}
.nm-row{display:flex;gap:8px;margin-top:10px}
.nm-sel{flex:1;padding:6px 8px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;background:#fff}
.nm-footer{font-size:10px;color:#94a3b8;text-align:center;margin-top:8px}
.nm-history{max-height:220px;overflow-y:auto;margin-top:12px;border-top:1px solid #f1f5f9;padding-top:10px;display:none}
.nm-history-label{font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px}
.nm-hist-item{padding:7px 0;border-bottom:1px solid #f8fafc}
.nm-hist-item:last-child{border-bottom:none}
.nm-hist-meta{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.nm-hist-type{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.nm-hist-date{font-size:10px;color:#94a3b8}
.nm-hist-note{font-size:12px;color:#334155;line-height:1.5}
.re-actions{display:flex;gap:5px;margin-top:6px}

// ── 헬퍼 함수 ──
function mths(mt){return mt.useAll?MONTHS:(mt.key==='s20c'?CON_MONTHS:BUZ_MONTHS);}
function getVals(rec,key,ms){return ms.map(m=>rec[m]?rec[m][key]:null);}
function getTeacher(name){
  for(const[t,info]of Object.entries(TEACHERS)){if(info.students.includes(name))return t;}
  return '미배정';
}
function calcStag(name){
  const s=STUDENTS[name];if(!s)return{danger:0,warn:0,good:0,score:0};
  let d=0,w=0,g=0;
  METRICS.forEach(mt=>{
    const vals=getVals(s.rec,mt.key,mths(mt));
    const valid=vals.filter(v=>v!==null);
    if(valid.length<2)return;
    const recent=valid.slice(-3);
    const diff=recent[recent.length-1]-recent[0];
    const imp=mt.hb?diff:-diff;
    if(imp>mt.thr*2)g++;else if(imp>=-mt.thr)w++;else d++;
  });
  return{danger:d,warn:w,good:g,score:d*2+w};
}
function calcScore(name){
  const s=STUDENTS[name];if(!s)return null;
  let total=0,max=0;
  METRICS.forEach(mt=>{
    const vals=getVals(s.rec,mt.key,mths(mt));
    const valid=vals.filter(v=>v!==null);
    if(valid.length<2)return;
    const recent=valid.slice(-3);
    const diff=recent[recent.length-1]-recent[0];
    const imp=mt.hb?diff:-diff;
    max+=2;
    if(imp>mt.thr*2)total+=2;else if(imp>=-mt.thr)total+=1;
  });
  return max>0?Math.round(total/max*100):null;
}
function scoreLvl(sc){
  if(sc===null)return{label:'데이터부족',cls:'fl',bg:'#f1f5f9',c:'#64748b'};
  if(sc>=75)return{label:'우수',cls:'up',bg:'#dcfce7',c:'#16a34a'};
  if(sc>=50)return{label:'양호',cls:'fl',bg:'#dbeafe',c:'#2563eb'};
  if(sc>=30)return{label:'보통',cls:'fl',bg:'#fef9c3',c:'#ca8a04'};
  return{label:'관리필요',cls:'dn',bg:'#fee2e2',c:'#dc2626'};
}
function getStagCauses(name){
  const s=STUDENTS[name];if(!s)return[];
  const cats={};
  METRICS.forEach(mt=>{
    const vals=getVals(s.rec,mt.key,mths(mt));
    const valid=vals.filter(v=>v!==null);
    if(valid.length<2)return;
    const recent=valid.slice(-3);
    const diff=recent[recent.length-1]-recent[0];
    const imp=mt.hb?diff:-diff;
    const lv=imp>mt.thr*2?'good':(imp>=-mt.thr?'warn':'danger');
    if(!cats[mt.cat]||lv==='danger')cats[mt.cat]=lv;
    else if(cats[mt.cat]==='good'&&lv==='warn')cats[mt.cat]=lv;
  });
  return Object.entries(cats).filter(([,v])=>v!=='good').map(([k,v])=>({cat:k,lv:v}));
}

function bSetStatus(name,status){

function saveNoteModal(){

  const rec={date:document.getElementById('nm-date').value,teacher:document.getElementById('nm-teacher').value||'미입력',type:document.getElementById('nm-type').value,note};

  <div class="card-box"><h3>🏋️ 트레이닝 프로그램 제안</h3><div id="prog-list"></div></div>`;

  // 차트 생성
  const cgHtml=METRICS.map(mt=>`<div class="chart-card"><div class="ct">${mt.label} <span class="cbadge" id="b${mt.ci}"></span></div><div class="chart-wrap"><canvas id="c${mt.ci}"></canvas></div></div>`).join('');

    const b=document.getElementById('b'+mt.ci);
    if(ch){const sign=ch.diff>0?'+':'';b.textContent=sign+ch.diff.toFixed(2)+mt.unit;b.className='cbadge '+(ch.imp>mt.thr?'up':ch.imp<-mt.thr?'dn':'fl');}
    else{b.textContent='-';b.className='cbadge fl';}
    const lc=!mt.hb?(ch&&ch.imp>mt.thr?'#16a34a':(ch&&ch.imp<-mt.thr?'#dc2626':clr)):clr;
    CI[mt.key]=new Chart(document.getElementById('c'+mt.ci).getContext('2d'),{type:'line',
      data:{labels:ms,datasets:[{data:vals,borderColor:lc,backgroundColor:lc+'18',borderWidth:2.5,pointRadius:vals.map(v=>v!==null?4:0),pointBackgroundColor:lc,tension:0.35,fill:true,spanGaps:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>{
          const val=c.parsed.y,idx=c.dataIndex;
          let prev=null;for(let i=idx-1;i>=0;i--){if(vals[i]!==null){prev=vals[i];break;}}
          const lines=[`${val} ${mt.unit}`];
          if(prev!==null){const d=val-prev;const imp=mt.hb?d:-d;lines.push(`전달대비 ${d>0?'+':''}${d.toFixed(2)}${mt.unit} ${imp>0?'▲ 향상':Math.abs(d)<0.001?'→':'▼ 하락'}`);}
          return lines;
        }}}},
        scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{grid:{color:'#f1f5f9'},ticks:{font:{size:9}},reverse:!mt.hb}}}});
  });
  // 월별 테이블
  document.getElementById('dtbl').innerHTML=
    `<thead><tr><th>월</th>${TBL_COLS.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>`+
    `<tbody>${MONTHS.filter(m=>s.rec[m]).map(m=>{
      const r=s.rec[m];const ic=CON_MONTHS.includes(m);
      return`<tr><td class="mc ${ic?'cc':'bc'}">${m}</td>${TBL_COLS.map(c=>{
        const v=r[c.key];const cls=(c.key==='s20c'&&ic)?'cc':(c.key==='s20b'&&!ic)?'bc':'';
        return v==null?`<td class="nv ${cls}">-</td>`:`<td class="${cls}">${v}<small style="color:#94a3b8"> ${c.unit}</small></td>`;

  // 프로그램 제안
  const sug=METRICS.map(mt=>{
    const vals=getVals(s.rec,mt.key,mths(mt));const valid=vals.filter(v=>v!==null);
    if(valid.length<2)return null;
    const recent=valid.slice(-3);const diff=recent[recent.length-1]-recent[0];const imp=mt.hb?diff:-diff;
    const lv=imp>mt.thr*2?'good':(imp>=-mt.thr?'warn':'danger');
    const cls=lv==='good'?'pg':(lv==='warn'?'pw':'pd');
    const p=PROG[mt.key];
    return`<div class="pi ${cls}"><div class="pi-ic">${p.icon}</div><div class="pi-body"><h4>${p.title}</h4><div class="pi-msg">${p[lv].msg}</div><div class="pi-drill">${p[lv].drill.replace(/\n/g,'<br>')}</div></div></div>`;
  }).filter(Boolean).sort((a,b)=>a.includes('pd')?-1:b.includes('pd')?1:a.includes('pw')?-1:1);
  document.getElementById('prog-list').innerHTML=sug.join('')||'<p style="color:#94a3b8;font-size:12px">데이터 부족</p>';
}

let _stagClps={};
function toggleStagGroup(tName){
  _stagClps[tName]=!_stagClps[tName];

  const tg=document.getElementById('sg-tg-'+tName);

function renderStagnation(){
  const MGMT=JSON.parse(localStorage.getItem('k1_mgmt')||'{}');
  const names=Object.keys(STUDENTS).sort();
  let allRows=names.map(n=>{
    const sc=calcStag(n);const score=calcScore(n);const lv=scoreLvl(score);
    const causes=getStagCauses(n);
    const overallLv=sc.danger>0?'danger':(sc.warn>0?'warn':'good');
    return{name:n,sc,score,lv,causes,overallLv,cnt:Object.keys(STUDENTS[n].rec).length};
  });
  let filtered=allRows;
  if(stagFilter==='danger')filtered=allRows.filter(r=>r.overallLv==='danger');
  else if(stagFilter==='warn')filtered=allRows.filter(r=>r.overallLv==='warn');
  else if(stagFilter==='good')filtered=allRows.filter(r=>r.overallLv==='good');
  filtered.sort((a,b)=>b.sc.score-a.sc.score);
  document.getElementById('stag-count').textContent=filtered.length+'명';
  const stBtns=['pending','active','done'];
  const stLabels=['미조치','관리중','완료'];
  const stClasses=['st-pending','st-active','st-done'];
  let html='';
  Object.entries(TEACHERS).forEach(function(entry){
    const tName=entry[0];const tInfo=entry[1];
    const tRows=filtered.filter(r=>getTeacher(r.name)===tName);
    const isClps=!!_stagClps[tName];
    html+='<div class="stag-group">';
    html+='<div class="stag-ghdr" onclick="toggleStagGroup(\''+tName+'\')">'+
      '<div style="width:28px;height:28px;border-radius:50%;background:'+tInfo.color+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px">'+tName[0]+'</div>'+
      '<span style="color:'+tInfo.color+';font-weight:700;font-size:13px">'+tName+'</span>'+
      '<span class="stag-gcnt">'+tRows.length+'명</span>'+
      '<span class="stag-toggle'+(isClps?' closed':'')+'" id="sg-tg-'+tName+'">▼</span>'+
    '</div>';
    html+='<div class="stag-gbody'+(isClps?' hidden':'')+'" id="sg-'+tName+'">';
    if(tRows.length===0){
      html+='<div class="stag-empty">해당 학생 없음</div>';
    }else{
      html+='<table class="stag-tbl"><thead><tr><th>학생</th><th>학교</th><th>측정</th><th>정체 원인</th><th>추천 조치</th><th>관리 상태</th><th></th></tr></thead><tbody>';
      tRows.forEach(function(r){
        const s=STUDENTS[r.name];
        const status=MGMT[r.name]||'pending';
        const causes=getStagCauses(r.name);
        const causeHtml=causes.length?causes.map(c=>'<span class="cause-tag'+(c.lv==='warn'?' warn':'')+'">' +c.cat+'</span>').join(''):'<span style="font-size:11px;color:#16a34a">이상없음</span>';
        const recAction=causes.length?PROG[METRICS.find(m=>m.cat===causes[0].cat&&causes[0].lv==='danger')?.key||METRICS.find(m=>m.cat===causes[0].cat)?.key]?.[causes[0].lv==='danger'?'danger':'warn']?.msg||'프로그램 확인 필요':'유지';
        html+='<tr>'+
          '<td><strong>'+r.name+'</strong></td>'+
          '<td style="font-size:11px;color:#64748b">'+s.school+'</td>'+
          '<td style="text-align:center;font-size:11px">'+r.cnt+'회</td>'+
          '<td>'+causeHtml+'</td>'+
          '<td style="font-size:11px;color:#374151;max-width:160px">'+recAction+'</td>'+
          '<td><div style="display:flex;gap:3px">'+
          stBtns.map(function(v,i){return'<button class="st-btn '+(v===status?stClasses[i]:'st-pending')+'" onclick="setMgmt(\''+r.name+'\',\''+v+'\',this)">'+stLabels[i]+'</button>';}).join('')+
          '</div></td>'+
          '<td><button class="go-btn" onclick="goStudentDetail(\''+r.name+'\')">→</button></td>'+
        '</tr>';
      });
      html+='</tbody></table>';
    }
    html+='</div></div>';
  });
  document.getElementById('stag-container').innerHTML=html;
}
function setMgmt(name,status,btn){
  const MGMT=JSON.parse(localStorage.getItem('k1_mgmt')||'{}');
  MGMT[name]=status;localStorage.setItem('k1_mgmt',JSON.stringify(MGMT));
  const stClasses=['st-pending','st-active','st-done'];
  const stBtns=['pending','active','done'];
  btn.closest('div').querySelectorAll('button').forEach((b,i)=>{
    b.className='st-btn '+(stBtns[i]===status?stClasses[i]:'st-pending');
  });
}

// ── 상담/조치 기록 ──
function renderRecords(){
  const q=document.getElementById('rec-stu-search').value||'';
  const RECS=JSON.parse(localStorage.getItem('k1_records')||'{}');
  const names=Object.keys(STUDENTS).filter(n=>n.includes(q));
  names.sort((a,b)=>{
    const aRecs=RECS[a]||[];const bRecs=RECS[b]||[];
    if(!aRecs.length&&!bRecs.length)return a.localeCompare(b,'ko');
    if(!aRecs.length)return 1;
    if(!bRecs.length)return -1;
    const aDate=(aRecs[0].editedAt||aRecs[0].date||'');
    const bDate=(bRecs[0].editedAt||bRecs[0].date||'');
    return bDate.localeCompare(aDate);
  });
  document.getElementById('rec-stu-list').innerHTML=names.map(n=>{
    const cnt=(RECS[n]||[]).length;
    const lastDate=cnt>0?(RECS[n][0].editedAt||RECS[n][0].date||''):'';
    return `<div class="rec-stu-row${recStu===n?' active':''}" onclick="selRecStu('${n}')">`+
      n+(cnt>0?`<span class="rec-badge">${cnt}건</span>`:'') +
      (lastDate?`<div style="font-size:9px;color:#94a3b8;margin-top:1px">${lastDate}</div>`:'') +
    '</div>';
  }).join('');
  document.getElementById('rec-stu-search').addEventListener('input',()=>renderRecords(),{once:true});
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('rec-date').value=today;
}
function selRecStu(name){
  recStu=name;
  document.querySelectorAll('.rec-stu-row').forEach(el=>el.classList.toggle('active',el.dataset.name===name));
  document.getElementById('rec-no-stu').style.display='none';
  document.getElementById('rec-form').style.display='block';
  const teacher=getTeacher(name);
  if(teacher!=='미배정')document.getElementById('rec-teacher').value=teacher;
  renderHistory(name);
}
function renderHistory(name){
  const RECS=JSON.parse(localStorage.getItem('k1_records')||'{}');
  const recs=RECS[name]||[];
  const typeColors={'상담':'#3b82f6','실기 피드백':'#10b981','프로그램 조정':'#f59e0b','기타':'#8b5cf6'};
  const tFull={'도현':'이도현','현수':'정현수','지은':'정지은','다빈':'전다빈','주혁':'박주혁','유선':'이유선','경준':'이경준','준기':'홍준기','소윤':'이소윤','병찬':'강병찬'};
  document.getElementById('rec-history-list').innerHTML=recs.length?recs.map((r,i)=>{
    const c=typeColors[r.type]||'#8b5cf6';
    const tLabel=tFull[r.teacher]||r.teacher||'미입력';
    return '<div class="rec-entry type-'+(r.type.split(' ')[0])+'" id="re-'+i+'">'+
      '<div class="re-top">'+
        '<span class="re-type" style="background:'+c+'20;color:'+c+'">'+r.type+'</span>'+
        '<span class="re-date">'+r.date+'</span>'+
        '<span class="re-teacher" style="font-weight:600">· '+tLabel+'</span>'+
      '</div>'+
      '<div class="re-note">'+r.note.replace(/\n/g,'<br>')+'</div>'+
      (r.editedAt?'<div class="re-edited">수정: '+r.editedAt+' · '+(tFull[r.editedBy]||r.editedBy||'')+'</div>':'')+
      
      '<div class="re-actions">'+
        '<button class="re-btn edit" onclick="editRecord(\''+name+'\','+i+')">편집</button>'+
        '<button class="re-btn del" onclick="delRecord(\''+name+'\','+i+')">삭제</button>'+
      '</div>'+
    '</div>';
  }).join(''):'<div class="rec-empty">아직 기록이 없습니다</div>';
}
function delRecord(name,idx){
  if(!confirm('이 기록을 삭제할까요?'))return;
  const RECS=JSON.parse(localStorage.getItem('k1_records')||'{}');
  if(RECS[name]){RECS[name].splice(idx,1);localStorage.setItem('k1_records',JSON.stringify(RECS));}
  renderHistory(name);renderRecords();
}
function editRecord(name,idx){
  const RECS=JSON.parse(localStorage.getItem('k1_records')||'{}');
  const r=(RECS[name]||[])[idx];if(!r)return;
  document.getElementById('rec-date').value=r.date;
  document.getElementById('rec-teacher').value=r.teacher||'';
  document.getElementById('rec-type').value=r.type;
  document.getElementById('rec-note').value=r.note;
  const form=document.getElementById('rec-form');
  form.dataset.editIdx=String(idx);
  form.style.display='block';
  document.querySelectorAll('.rec-entry').forEach(e=>e.classList.remove('editing'));
  const entry=document.getElementById('re-'+idx);
  if(entry){entry.classList.add('editing');entry.scrollIntoView({behavior:'smooth',block:'nearest'});}
  document.querySelector('#rec-form .save-btn').textContent='수정 완료';
  document.getElementById('rec-note').focus();
}
function saveRecord(){
  if(!recStu)return;
  const rec={date:document.getElementById('rec-date').value,teacher:document.getElementById('rec-teacher').value||'미입력',type:document.getElementById('rec-type').value,note:document.getElementById('rec-note').value};
  if(!rec.note.trim()){alert('내용을 입력해주세요');return;}
  const RECS=JSON.parse(localStorage.getItem('k1_records')||'{}');
  if(!RECS[recStu])RECS[recStu]=[];
  const form=document.getElementById('rec-form');
  const editIdx=form.dataset.editIdx;
  if(editIdx!==undefined&&editIdx!==''){
    rec.editedAt=new Date().toISOString().slice(0,10);rec.editedBy=rec.teacher;
    RECS[recStu][parseInt(editIdx)]=rec;
    delete form.dataset.editIdx;
    document.querySelector('#rec-form .save-btn').textContent='저장';
    document.querySelectorAll('.rec-entry').forEach(e=>e.classList.remove('editing'));
  }else{
    RECS[recStu].unshift(rec);
  }
  localStorage.setItem('k1_records',JSON.stringify(RECS));
  document.getElementById('rec-note').value='';
  renderHistory(recStu);
  renderRecords();
}
// ── 초기화 ──
document.getElementById('stu-search').addEventListener('input',()=>renderStuList());
document.getElementById('rec-stu-search').addEventListener('input',()=>renderRecords());
(function waitFB(){
  if(!_fbReady){setTimeout(waitFB,80);return;}
  try{const s=JSON.parse(_lsGet('k1_stu_status')||'null');if(s)STU_STATUS=s;}catch(e){}
  _bst=null;
  const el=document.getElementById('fb-loading');if(el)el.remove();
  renderDashboard();renderStuList();
  FB_KEYS.forEach(k=>{
    fbDB.ref('data/'+k).on('value',snap=>{
      if(!_fbReady)return;
      const v=snap.val();if(v===null)return;
      if(_lsGet(k)===v)return;
      _lsSet(k,v);
      if(k==='k1_stu_status'){try{STU_STATUS=JSON.parse(v);}catch(e){}}
      if(k==='k1_board')_bst=null;
      renderDashboard();
      if(curPage==='students')renderStuList();
      if(curPage==='stagnation')renderStagnation();
      if(curPage==='records'){renderRecords();if(recStu)renderHistory(recStu);}
    });
  });
})();
</script>
